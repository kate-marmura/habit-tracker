services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-habbit_tracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build: ./server
    profiles: ["prod"]
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  client:
    build: ./client
    profiles: ["prod"]
    ports:
      - "80:8080"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # --- Dev profile services ---
  server-dev:
    build: ./server
    profiles: ["dev"]
    ports:
      - "3001:3001"
      - "9229:9229"
    env_file: .env
    volumes:
      - ./server/src:/app/src
      - /app/node_modules
    command: npx tsx watch src/index.ts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  client-dev:
    build:
      context: ./client
      target: build
    profiles: ["dev"]
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
      - /app/node_modules
    command: npx vite --host
    depends_on:
      server-dev:
        condition: service_healthy
    restart: unless-stopped

  # --- Test profile services ---
  db-test:
    image: postgres:16-alpine
    profiles: ["test"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: habbit_tracker_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
